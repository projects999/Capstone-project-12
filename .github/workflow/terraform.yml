name: Terraform Validation
on:
    push:
        branches:
            - main

jobs:
    terraform-check:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout Code
              uses: actions/checkout@v4
            
            - name: Setup Terraform
              uses: hashicorp/setup-terraform@v3

            - name: Terraform Init
              run: terraform init
            
            - name: Terraform Plan
              run: terraform plan

            - name: Upload Plan Artifact
              run: actions/upload-artifact@v4
              with:
                name: terraform-plan
                path: tfpath